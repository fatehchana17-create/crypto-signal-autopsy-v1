name: Hourly crypto scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: hourly-crypto-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run scan, tracking, and export
        env:
          CSA_DB_PATH: data/autopsy.sqlite
          CSA_EXPORT_DIR: exports
          CSA_DEX_CHAIN: base
          CSA_GOPLUS_CHAIN_ID: "8453"
          CSA_CEX_TOP_N: "300"
          CSA_DEX_SEARCH_QUERIES: "base,virtual,ai,agent,meme,degen,pepe,dog,cat,coin,moon,launch"
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
          COINGECKO_PRO_API_KEY: ${{ secrets.COINGECKO_PRO_API_KEY }}
          GOPLUS_ACCESS_TOKEN: ${{ secrets.GOPLUS_ACCESS_TOKEN }}
          GOPLUS_API_KEY: ${{ secrets.GOPLUS_API_KEY }}
          MORALIS_API_KEY: ${{ secrets.MORALIS_API_KEY }}
          BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
          CSA_REQUIRE_GOPLUS: "false"
          CSA_WALLET_MODULE_ENABLED: "true"
          CSA_WALLET_PROVIDER: "moralis"
          CSA_WALLET_HISTORY_DAYS: "7"
          CSA_WALLET_PAIR_LIMIT: "25"
          CSA_WALLET_TRADE_LIMIT: "100"
          CSA_MIN_LIQUIDITY_USD: "500000"
          CSA_MIN_VOLUME_24H_USD: "100000"
          CSA_MIN_PAIR_AGE_HOURS: "6"
          CSA_MAX_PRICE_CHANGE_H1_PCT: "75"
          CSA_MAX_BUY_TAX_PCT: "10"
          CSA_MAX_SELL_TAX_PCT: "10"
          CSA_VOLUME_SPIKE_MULTIPLE: "3"
          CSA_CLEAN_MOMENTUM_MIN_H1_PCT: "3"
          CSA_LIQUIDITY_EXPANSION_MIN_PCT: "5"
          CSA_DELAYED_ENTRY_MINUTES: "5"
          CSA_ESTIMATED_COST_PCT: "0.5"
        run: |
          mkdir -p data exports
          python -m crypto_signal_autopsy.cli init-db
          python -m crypto_signal_autopsy.cli scan
          python -m crypto_signal_autopsy.cli track
          python -m crypto_signal_autopsy.cli wallets
          python -m crypto_signal_autopsy.cli export
          python -m crypto_signal_autopsy.cli static-site
          python - <<'PY'
          import sqlite3
          conn = sqlite3.connect("data/autopsy.sqlite")
          conn.execute("PRAGMA wal_checkpoint(TRUNCATE)")
          conn.close()
          PY
          rm -f data/autopsy.sqlite-wal data/autopsy.sqlite-shm

      - name: Commit updated research data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/autopsy.sqlite exports/*.csv exports/dashboard/data/*.json docs/index.html docs/.nojekyll docs/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update hourly crypto scan data"
            git push
          fi
