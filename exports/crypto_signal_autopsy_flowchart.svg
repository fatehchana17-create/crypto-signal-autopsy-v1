<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Crypto Signal Autopsy V1 Flowchart</title>
  <desc id="desc">A clean flowchart showing how public API data enters the Python scanner, gets filtered, stored in SQLite, tracked, exported, and displayed on the website.</desc>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfb"/>
      <stop offset="1" stop-color="#eaf3f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17373d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#3e646c"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #14363d; }
      .subtitle { font: 400 21px Arial, sans-serif; fill: #557077; }
      .lane { font: 700 16px Arial, sans-serif; fill: #6d858b; letter-spacing: 1px; }
      .box { fill: #fff; stroke: #c7dcdd; stroke-width: 2; filter: url(#shadow); }
      .source { fill: #eef8f7; stroke: #9bc8c8; }
      .filter { fill: #fff8e7; stroke: #e1c46c; }
      .record { fill: #f4f0ff; stroke: #c3b5ee; }
      .site { fill: #edf4ff; stroke: #a8c0ea; }
      .label { font: 700 23px Arial, sans-serif; fill: #14363d; }
      .small { font: 400 18px Arial, sans-serif; fill: #536f76; }
      .tiny { font: 400 15px Arial, sans-serif; fill: #6b7f84; }
      .arrow { stroke: #3e646c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6d858b; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="url(#bg)"/>

  <text x="80" y="82" class="title">Crypto Signal Autopsy V1</text>
  <text x="80" y="120" class="subtitle">Public APIs bring data in. Python filters it. SQLite stores it. The website only shows what is stored.</text>

  <text x="84" y="180" class="lane">1. DATA SOURCES</text>
  <text x="405" y="180" class="lane">2. PYTHON WORKER</text>
  <text x="755" y="180" class="lane">3. DECISION</text>
  <text x="1080" y="180" class="lane">4. STORAGE</text>
  <text x="1330" y="180" class="lane">5. WEBSITE</text>

  <rect x="80" y="250" width="270" height="360" rx="18" class="box source"/>
  <text x="115" y="297" class="label">API Data In</text>
  <text x="115" y="344" class="small">CoinGecko</text>
  <text x="115" y="373" class="tiny">Top 100 market context</text>
  <text x="115" y="438" class="small">DEX Screener</text>
  <text x="115" y="467" class="tiny">Base-chain token pairs</text>
  <text x="115" y="532" class="small">GoPlus</text>
  <text x="115" y="561" class="tiny">Optional, needs API token</text>

  <rect x="410" y="250" width="280" height="95" rx="16" class="box"/>
  <text x="445" y="290" class="label">Hourly Automation</text>
  <text x="445" y="320" class="small">Runs scan + tracking</text>

  <rect x="410" y="405" width="280" height="95" rx="16" class="box"/>
  <text x="445" y="445" class="label">Fetch + Normalize</text>
  <text x="445" y="475" class="small">Turns API data into rows</text>

  <rect x="410" y="560" width="280" height="115" rx="16" class="box filter"/>
  <text x="445" y="604" class="label">Hard Filters</text>
  <text x="445" y="635" class="small">Liquidity, volume, age,</text>
  <text x="445" y="661" class="small">price move, missing data</text>

  <polygon points="785,625 915,545 1045,625 915,705" class="box filter"/>
  <text x="857" y="616" class="label">Passes</text>
  <text x="845" y="646" class="label">all rules?</text>

  <rect x="1090" y="460" width="220" height="260" rx="18" class="box record"/>
  <text x="1125" y="505" class="label">Saved Records</text>
  <text x="1125" y="555" class="small">Accepted signals</text>
  <text x="1125" y="584" class="tiny">Tokens that pass all filters</text>
  <text x="1125" y="650" class="small">Rejected tokens</text>
  <text x="1125" y="679" class="tiny">Tokens saved with reasons</text>

  <rect x="1340" y="460" width="220" height="120" rx="16" class="box record"/>
  <text x="1375" y="506" class="label">SQLite</text>
  <text x="1375" y="537" class="small">Local database</text>
  <text x="1375" y="563" class="tiny">The source of truth</text>

  <rect x="1340" y="250" width="220" height="125" rx="16" class="box site"/>
  <text x="1375" y="294" class="label">Website</text>
  <text x="1375" y="325" class="small">Overview</text>
  <text x="1375" y="351" class="tiny">Manual review, audit, tables</text>

  <rect x="1340" y="710" width="220" height="115" rx="16" class="box"/>
  <text x="1375" y="754" class="label">1h / 24h Audit</text>
  <text x="1375" y="785" class="small">Checks later prices</text>
  <text x="1375" y="811" class="tiny">Accepted and rejected</text>

  <rect x="1340" y="860" width="220" height="95" rx="16" class="box site"/>
  <text x="1375" y="901" class="label">CSV Exports</text>
  <text x="1375" y="931" class="small">Shareable raw data</text>

  <path d="M350 430 H410" class="arrow"/>
  <path d="M550 345 V405" class="arrow"/>
  <path d="M550 500 V560" class="arrow"/>
  <path d="M690 618 H785" class="arrow"/>
  <path d="M1045 625 H1090" class="arrow"/>
  <path d="M1310 590 H1340" class="arrow"/>
  <path d="M1450 460 V375" class="arrow"/>
  <path d="M1450 580 V710" class="arrow"/>
  <path d="M1450 825 V860" class="arrow"/>

  <rect x="80" y="980" width="1480" height="42" rx="12" fill="#ffffff" stroke="#d6e3e3"/>
  <text x="110" y="1006" class="tiny">Simple truth: the website does not invent coins. Python fills SQLite by calling public APIs, filtering tokens, and checking accepted/rejected coins later.</text>
</svg>
